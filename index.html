<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff5a00" />
    <meta name="description" content="BagreScore: app offline-first para organizar peladas, jogos, eventos e estatísticas." />
    <title>BagreScore</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="stylesheet" href="style.css?v=0.15.1" />
    <script src="app.js?v=0.15.1" defer></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand home-brand-lockup">
          <img class="home-brand-logo" src="assets/icons/bagrescore-logo-header.png" alt="BagreScore" />
          <p>Onde os bagres viram lenda.</p>
        </div>

        <div class="topbar-actions">
          <button class="settings-button" id="home-settings-toggle" type="button" aria-label="Abrir configurações">
            <span aria-hidden="true">&#9881;</span>
          </button>
        </div>
      </header>

      <main>
        <section class="home-screen" id="home-screen" aria-labelledby="home-title">
          <div id="home-content"></div>
        </section>

        <section class="workspace-panel is-home" aria-live="polite">
          <div class="section-heading">
            <div>
              <span class="panel-kicker" id="section-kicker">Início</span>
              <h2 id="section-title">Resumo da pelada</h2>
            </div>
            <div class="section-actions">
              <button class="ghost-button compact-button" id="back-home" type="button" hidden>Voltar ao início</button>
              <span class="status-pill" id="pending-count">0 pendentes</span>
            </div>
          </div>
          <div id="section-content"></div>
        </section>
      </main>

      <nav class="bottom-nav" aria-label="Navegação principal">
        <button class="quick-action bottom-nav-item active" data-section="inicio" type="button">
          <span class="nav-glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M3.5 10.5 12 3l8.5 7.5v9a1.5 1.5 0 0 1-1.5 1.5H5a1.5 1.5 0 0 1-1.5-1.5z"/><path d="M9 21v-7h6v7"/></svg></span>
          <span>Início</span>
        </button>
        <button class="quick-action bottom-nav-item" data-section="peladas" type="button">
          <span class="nav-glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="3"/><path d="M8 2v4M16 2v4M3 9h18"/><circle cx="12" cy="14.5" r="2.5"/></svg></span>
          <span>Peladas</span>
        </button>
        <button class="quick-action bottom-nav-item" data-section="ao-vivo" type="button">
          <span class="nav-glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.5" fill="currentColor" stroke="none"/><path d="M7.7 7.7a6 6 0 0 0 0 8.6M16.3 7.7a6 6 0 0 1 0 8.6M4.5 4.5a10.6 10.6 0 0 0 0 15M19.5 4.5a10.6 10.6 0 0 1 0 15"/></svg></span>
          <span>Ao Vivo</span>
        </button>
        <button class="quick-action bottom-nav-item" data-section="jogadores" type="button">
          <span class="nav-glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><circle cx="17" cy="9" r="2.5"/><path d="M3.5 20v-1.5A5.5 5.5 0 0 1 9 13h.5a5.5 5.5 0 0 1 5.5 5.5V20M14 14.2a4.8 4.8 0 0 1 6.5 4.5V20"/></svg></span>
          <span>Jogadores</span>
        </button>
        <button class="quick-action bottom-nav-item" data-section="ranking" type="button">
          <span class="nav-glyph" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 4v3a4 4 0 0 0 4 4h6a4 4 0 0 0 4-4V4zM5 6H2v1a4 4 0 0 0 4 4M19 6h3v1a4 4 0 0 1-4 4M12 11v5M8 21h8M9 16h6v5H9z"/></svg></span>
          <span>Ranking</span>
        </button>
      </nav>
    </div>

    <div class="settings-drawer-backdrop" id="settings-drawer-backdrop" hidden></div>
    <aside class="settings-drawer" id="settings-drawer" aria-hidden="true" aria-labelledby="settings-drawer-title">
      <div class="drawer-header">
        <h2 id="settings-drawer-title">Configurações</h2>
        <button class="drawer-close-button" id="settings-drawer-close" type="button" aria-label="Fechar configurações">×</button>
      </div>

      <div class="drawer-actions">
        <article class="drawer-card">
          <span class="drawer-icon online-dot" aria-hidden="true"></span>
          <span>
            <strong>Status: <span id="network-status">Verificando rede</span></strong>
            <small id="db-status">Banco local</small>
          </span>
        </article>

        <button class="drawer-card drawer-button" id="install-app" type="button" hidden>
          <span class="drawer-icon" aria-hidden="true">↓</span>
          <span>
            <strong>Instalar app</strong>
            <small>Instale o BagreScore neste dispositivo</small>
          </span>
        </button>

        <button class="drawer-card drawer-button" id="account-button" type="button">
          <span class="drawer-icon" aria-hidden="true">●</span>
          <span>
            <strong id="account-label">Modo local</strong>
            <small id="account-detail">Servidor ainda não configurado</small>
          </span>
        </button>

        <button class="drawer-card drawer-button" id="sync-now" type="button">
          <span class="drawer-icon" aria-hidden="true">↻</span>
          <span>
            <strong>Atualizar</strong>
            <small>Verifique dados e sincronização</small>
          </span>
        </button>

        <button class="drawer-card drawer-button" id="force-update" type="button">
          <span class="drawer-icon" aria-hidden="true">↑</span>
          <span>
            <strong>Forçar atualização</strong>
            <small>Limpe cache e carregue a versão mais recente</small>
          </span>
        </button>

        <button class="drawer-card drawer-button" id="drawer-sync-option" type="button">
          <span class="drawer-icon" aria-hidden="true">⇄</span>
          <span>
            <strong>Sincronização</strong>
            <small id="sync-status">Sincronização aguardando configuração</small>
          </span>
        </button>

        <button class="drawer-card drawer-button" data-section="configuracoes" type="button">
          <span class="drawer-icon muted-icon" aria-hidden="true">i</span>
          <span>
            <strong>Sobre o BagreScore</strong>
            <small>Versão <span id="app-version">0.0.0</span></small>
          </span>
        </button>

        <button class="drawer-card drawer-button danger-drawer-button" id="logout-button" type="button" hidden>
          <span class="drawer-icon" aria-hidden="true">↪</span>
          <span>
            <strong>Sair da conta</strong>
            <small>Encerrar a sessão neste aparelho</small>
          </span>
        </button>
      </div>
    </aside>

    <div class="auth-gate" id="auth-gate" hidden>
      <section class="auth-card" role="dialog" aria-modal="true" aria-labelledby="auth-title">
        <img class="auth-logo" src="assets/icons/bagrescore-logo.png" alt="BagreScore" />
        <span class="auth-kicker">Conta BagreScore</span>
        <h2 id="auth-title">Entre para sincronizar</h2>
        <p>Use a conta criada pelo administrador da pelada.</p>

        <form class="auth-form" id="auth-login-form" novalidate>
          <label class="field-label">
            <span>Usuário</span>
            <input type="text" name="login" autocomplete="username" autocapitalize="none" required />
          </label>
          <label class="field-label">
            <span>PIN</span>
            <input type="password" name="pin" inputmode="numeric" autocomplete="current-password" minlength="4" maxlength="12" required />
          </label>
          <p class="auth-error" id="auth-error" role="alert" hidden></p>
          <button class="primary-button" type="submit">Entrar</button>
        </form>

        <button class="ghost-button auth-server-button" id="auth-change-server" type="button">Reconfigurar servidor</button>
        <small class="auth-offline-note">Depois do primeiro login, sua sessão continua disponível mesmo quando a internet cair.</small>
      </section>
    </div>
  </body>
</html>
